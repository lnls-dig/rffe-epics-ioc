# Communication protocol definition

OutTerminator = CR LF;
InTerminator = CR LF;

# Attenuation
outAtt {
    out "SET:ATTEnuation %f";
}

inAtt {
    out "GET:ATTEnuation?";
    in "%f";
}

# Temperature Measurement
inMeasTempAC {
    out "MEASure:TEMPerature:AC?";
    in "%f";
}

inMeasTempBD {
    out "MEASure:TEMPerature:BD?";
    in "%f";
}

# Operation
Rst {
    out "SYSTem:RESet";
}
